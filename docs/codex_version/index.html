<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading codex_version...</title>
  <meta name="robots" content="noindex">
  <style>
    :root {
      --bg: #0f1418;
      --panel: #182127;
      --text: #f3efe8;
      --muted: #9fb0b8;
      --accent: #d58b50;
      --line: rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(213,139,80,0.18), transparent 22rem),
        radial-gradient(circle at 80% 80%, rgba(85,122,127,0.2), transparent 24rem),
        linear-gradient(180deg, #10171c 0%, #0d1216 100%);
      color: var(--text);
      font: 16px/1.6 "Space Grotesk", "Segoe UI", sans-serif;
      padding: 2rem;
    }
    .card {
      width: min(100%, 42rem);
      background: rgba(24, 33, 39, 0.9);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    h1 {
      margin: 0 0 0.75rem;
      font: 700 clamp(1.8rem, 4vw, 2.6rem)/1.05 Georgia, serif;
      letter-spacing: -0.02em;
    }
    p { margin: 0.6rem 0; color: var(--muted); }
    .row {
      margin-top: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.9rem;
      color: var(--text);
    }
    .dot {
      width: 0.9rem;
      height: 0.9rem;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 0 rgba(213,139,80,0.55);
      animation: pulse 1.4s infinite;
    }
    code {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0.2rem 0.5rem;
      color: var(--text);
    }
    a {
      color: #f0bb8a;
      text-decoration: none;
      font-weight: 700;
    }
    a:hover { text-decoration: underline; }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(213,139,80,0.55); }
      70% { box-shadow: 0 0 0 14px rgba(213,139,80,0); }
      100% { box-shadow: 0 0 0 0 rgba(213,139,80,0); }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Loading codex_version</h1>
    <p>This path is being served from GitHub Pages <code>main/docs</code>, while the full codex build lives on branch <code>sh5b6</code>.</p>
    <div class="row"><span class="dot" aria-hidden="true"></span><strong>Fetching the published codex artifact now.</strong></div>
    <p id="status">If this takes more than a few seconds, use the fallback link below.</p>
    <p><a href="https://raw.githubusercontent.com/abaidalgarni/copilot_version/sh5b6/index.html">Open the branch artifact directly</a></p>
  </main>
  <script>
    const sourceUrl = 'https://raw.githubusercontent.com/abaidalgarni/copilot_version/sh5b6/index.html';
    fetch(sourceUrl, { cache: 'no-store' })
      .then((response) => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.text();
      })
      .then((html) => {
        document.open();
        document.write(html);
        document.close();
      })
      .catch((error) => {
        const status = document.getElementById('status');
        status.textContent = `Automatic load failed: ${error.message}. Use the fallback link.`;
      });
  </script>
</body>
</html>
